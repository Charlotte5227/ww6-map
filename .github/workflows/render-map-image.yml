name: Render Map Image

concurrency:
  group: render-map-image-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-map-image.yml
      - map-data.json
      - time-config.json
      - history/**
      - map.svg
      - viewer.js
      - image-exporter.js
      - index.html
      - package.json
      - scripts/render-map-image.mjs
      - style.css
  workflow_dispatch:
    inputs:
      labels:
        description: "Label visibility"
        type: choice
        required: false
        default: show
        options:
          - show
          - hide
          - keep
      numbers:
        description: "Province number visibility"
        type: choice
        required: false
        default: hide
        options:
          - show
          - hide
          - keep
      topo_mode:
        description: "Topography layer"
        type: choice
        required: false
        default: show
        options:
          - show
          - hide
          - keep
      topo_opacity:
        description: "Topography opacity (0.0-1.0)"
        type: string
        required: false
        default: "0.5"
      climate_mode:
        description: "Climate layer"
        type: choice
        required: false
        default: hide
        options:
          - show
          - hide
          - keep
      climate_opacity:
        description: "Climate opacity (0.0-1.0)"
        type: string
        required: false
        default: "0.5"
      region_mode:
        description: "Region layer"
        type: choice
        required: false
        default: hide
        options:
          - show
          - hide
          - keep
      region_opacity:
        description: "Region opacity (0.0-1.0)"
        type: string
        required: false
        default: "0.5"
      continent_mode:
        description: "Continent layer"
        type: choice
        required: false
        default: hide
        options:
          - show
          - hide
          - keep
      continent_opacity:
        description: "Continent opacity (0.0-1.0)"
        type: string
        required: false
        default: "0.5"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start static server
        run: python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/map-server.log 2>&1 &

      - name: Wait for static server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173/index.html > /dev/null; then
              echo "Static server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Static server failed to start"
          cat /tmp/map-server.log || true
          exit 1

      - name: Render latest map image (push default)
        if: github.event_name != 'workflow_dispatch'
        env:
          MAP_RENDER_BASE_URL: http://127.0.0.1:4173/index.html
          MAP_RENDER_OUT: generated/map-latest.png
          MAP_RENDER_EXPORT_MODE: full
          MAP_RENDER_LABELS: show
          MAP_RENDER_NUMBERS: hide
          MAP_RENDER_BG_TOPO: show
          MAP_RENDER_BG_TOPO_OPACITY: "0.5"
          MAP_RENDER_BG_CLIMATE: hide
          MAP_RENDER_BG_CLIMATE_OPACITY: "0.5"
          MAP_RENDER_BG_REGION: hide
          MAP_RENDER_BG_REGION_OPACITY: "0.5"
          MAP_RENDER_BG_CONTINENT: hide
          MAP_RENDER_BG_CONTINENT_OPACITY: "0.5"
        run: npm run render:image

      - name: Render latest map image (manual inputs)
        if: github.event_name == 'workflow_dispatch'
        env:
          MAP_RENDER_BASE_URL: http://127.0.0.1:4173/index.html
          MAP_RENDER_OUT: generated/map-latest.png
          MAP_RENDER_EXPORT_MODE: full
          MAP_RENDER_LABELS: ${{ inputs.labels }}
          MAP_RENDER_NUMBERS: ${{ inputs.numbers }}
          MAP_RENDER_BG_TOPO: ${{ inputs.topo_mode }}
          MAP_RENDER_BG_TOPO_OPACITY: ${{ inputs.topo_opacity }}
          MAP_RENDER_BG_CLIMATE: ${{ inputs.climate_mode }}
          MAP_RENDER_BG_CLIMATE_OPACITY: ${{ inputs.climate_opacity }}
          MAP_RENDER_BG_REGION: ${{ inputs.region_mode }}
          MAP_RENDER_BG_REGION_OPACITY: ${{ inputs.region_opacity }}
          MAP_RENDER_BG_CONTINENT: ${{ inputs.continent_mode }}
          MAP_RENDER_BG_CONTINENT_OPACITY: ${{ inputs.continent_opacity }}
        run: npm run render:image

      - name: Render precomposed base image
        env:
          MAP_RENDER_BASE_URL: http://127.0.0.1:4173/index.html
          MAP_RENDER_OUT: generated/map-base.png
          MAP_RENDER_EXPORT_MODE: base
        run: npm run render:image

      - name: Render precomposed country-label image
        env:
          MAP_RENDER_BASE_URL: http://127.0.0.1:4173/index.html
          MAP_RENDER_OUT: generated/map-labels-country.png
          MAP_RENDER_EXPORT_MODE: labels-country
        run: npm run render:image

      - name: Render precomposed number-label image
        env:
          MAP_RENDER_BASE_URL: http://127.0.0.1:4173/index.html
          MAP_RENDER_OUT: generated/map-labels-number.png
          MAP_RENDER_EXPORT_MODE: labels-number
        run: npm run render:image

      - name: Render precomposed all-label image
        env:
          MAP_RENDER_BASE_URL: http://127.0.0.1:4173/index.html
          MAP_RENDER_OUT: generated/map-labels-both.png
          MAP_RENDER_EXPORT_MODE: labels-both
        run: npm run render:image

      - name: Verify generated assets exist
        run: |
          test -f generated/map-latest.png
          test -f generated/map-base.png
          test -f generated/map-labels-country.png
          test -f generated/map-labels-number.png
          test -f generated/map-labels-both.png

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-latest
          path: |
            generated/map-latest.png
            generated/map-base.png
            generated/map-labels-country.png
            generated/map-labels-number.png
            generated/map-labels-both.png

      - name: Commit generated image
        run: |
          if git diff --quiet -- generated/map-latest.png generated/map-base.png generated/map-labels-country.png generated/map-labels-number.png generated/map-labels-both.png; then
            echo "No image changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/map-latest.png generated/map-base.png generated/map-labels-country.png generated/map-labels-number.png generated/map-labels-both.png
          git commit -m "chore: refresh generated map assets [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
